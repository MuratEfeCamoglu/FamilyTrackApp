name: familytrackapp
description: "Aile Takip Uygulaması — Sevdiklerinizle geçirdiğiniz önemli anları kayıt altına alın."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  # iOS stil ikonları
  cupertino_icons: ^1.0.8

  # State Management — CLAUDE.md: Cubit (flutter_bloc) zorunlu
  flutter_bloc: ^8.1.5

  # Dependency Injection — CLAUDE.md: get_it + injectable
  get_it: ^7.6.7
  injectable: ^2.3.2

  # Firebase — CLAUDE.md: Firestore + Auth + Storage
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.2

  # Fonksiyonel Programlama — CLAUDE.md: Either pattern (dartz)
  dartz: ^0.10.1

  # UI — CLAUDE.md: google_fonts (Nunito + DM Sans), cached images
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1

  # Fotoğraf seçme ve sıkıştırma — CLAUDE.md: max 5MB kontrolü
  image_picker: ^1.1.2
  flutter_image_compress: ^2.2.0

  # Utility
  intl: ^0.19.0          # Tarih formatlama
  equatable: ^2.0.5      # Value equality (state sınıfları için)
  uuid: ^4.4.0            # Benzersiz ID üretimi

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Kod üretimi — injectable için zorunlu
  injectable_generator: ^2.4.2
  build_runner: ^2.4.9

  # Linting
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  # Tasarım referans görselleri (CLAUDE.md §Tasarım Referansları)
  assets:
    - Resimler/
